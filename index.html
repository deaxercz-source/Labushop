}">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%23131316'/><text x='256' y='340' font-family='system-ui,sans-serif' font-size='300' font-weight='800' fill='%23FF6B2B' text-anchor='middle'>L</text></svg>">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
// ── DATA & FIREBASE ──
var data = {people:[],sites:[],bonuses:[],costs:[],expenses:[],notes:[]};
var DB_DOC = 'labubu/main';
var _saveTimer = null;

firebase.initializeApp({
  apiKey: "AIzaSyCtw2jh80pjX6DfGYnp9dooDS38h9Wmshg",
  authDomain: "stanek-kalendar.firebaseapp.com",
  projectId: "stanek-kalendar",
  appId: "1:927791584501:web:ae99a0fd7499efd66d61bc"
});
var auth = firebase.auth();
var db = firebase.firestore();

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function save(){
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function(){
    db.doc(DB_DOC).set(data).catch(function(e){console.error('Save error:',e);});
  },500);
}

function showLoading(show){
  var el=document.getElementById('loading-screen');
  if(el) el.style.display=show?'flex':'none';
}

function initData(userId){
  DB_DOC='labubu/'+userId;
  showLoading(true);
  db.doc(DB_DOC).onSnapshot(function(doc){
    if(doc.exists){
      data=doc.data();
    } else {
      var local=JSON.parse(localStorage.getItem('labubu-data')||'null');
      if(local){ data=local; db.doc(DB_DOC).set(data).then(function(){localStorage.removeItem('labubu-data');}); }
      else { data={people:[],sites:[],bonuses:[],costs:[],expenses:[],notes:[]}; }
    }
    if(!data.costs) data.costs=[];
    if(!data.expenses) data.expenses=[];
    if(!data.notes) data.notes=[];
    showLoading(false);
    render();
  },function(err){ console.error('Firestore:',err); showLoading(false); });
}

// ── AUTH ──
window._fbSignIn = function(){
  var email=document.getElementById("login-email").value.trim();
  var pass=document.getElementById("login-pass").value;
  var errEl=document.getElementById("login-err");
  var btn=document.getElementById("login-btn");
  errEl.textContent=""; btn.textContent="Přihlašuji…"; btn.disabled=true;
  auth.signInWithEmailAndPassword(email,pass).catch(function(e){
    errEl.textContent="Špatný email nebo heslo.";
    btn.textContent="Přihlásit se"; btn.disabled=false;
  });
};
window._fbSignOut=function(){auth.signOut();};

document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("login-pass").addEventListener("keydown",function(e){
    if(e.key==="Enter") window._fbSignIn();
  });
  auth.onAuthStateChanged(function(user){
    if(user){
      document.getElementById("login-screen").style.display="none";
      document.getElementById("app-root").style.display="flex";
      document.getElementById("user-email").textContent=user.email;
      initData(user.uid);
    } else {
      document.getElementById("login-screen").style.display="flex";
      document.getElementById("app-root").style.display="none";
    }
  });
});

// ── NAVIGATION ──
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  render();
}
function showPageMobile(id,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  document.querySelectorAll('.bottom-nav-item').forEach(function(n){n.classList.remove('active');});
  document.getElementById('page-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  render();
}

// ── MODALS ──
function openModal(id,personId){
  if(id==='modal-bonus') populateBonusModal(personId);
  if(id==='modal-note'&&!document.getElementById('n-id').value) openNoteModal(personId||'');
  if(id==='modal-expense'){
    if(!document.getElementById('ex-id').value){
      document.getElementById('ex-id').value='';
      document.getElementById('ex-name').value='';
      document.getElementById('ex-amount').value='';
      var ed=new Date();
      document.getElementById('ex-date').value=ed.getFullYear()+'-'+String(ed.getMonth()+1).padStart(2,'0')+'-'+String(ed.getDate()).padStart(2,'0');
      document.getElementById('ex-category').value='reklama';
      document.getElementById('ex-note').value='';
      document.getElementById('expense-modal-title').textContent='Nový výdaj';
    }
  }
  document.getElementById(id).classList.add('open');
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.modal-overlay').forEach(function(m){
    m.addEventListener('click',function(e){if(e.target===m) m.classList.remove('open');});
  });
});

// ── HELPERS ──
function ini(name){return name.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);}
function giftChip(t){return t==='labubu'?'<span class="chip chip-purple">🐣 Labubu</span>':'<span class="chip chip-amber">🥟 Dumpling</span>';}
function statusChip(s){
  var m={pending:['chip-amber','⏳ Čeká'],ordered:['chip-blue','📦 Objednáno'],wait:['chip','🕐 Vyzvednutí'],done:['chip-green','✅ Předáno']};
  var cl=m[s]||['chip',s];
  return '<span class="chip '+cl[0]+'">'+cl[1]+'</span>';
}
function updateBottomNavBadge(){
  var pending=data.bonuses.filter(function(b){return b.status!=='done';}).length;
  var el=document.getElementById('bn-badge-people');
  if(el){if(pending>0){el.className='bn-badge';el.textContent=pending;}else{el.className='';el.textContent='';}}
}

// ── RENDER ──
function render(){
  if(!data.costs) data.costs=[];
  if(!data.expenses) data.expenses=[];
  if(!data.notes) data.notes=[];
  updateBottomNavBadge();
  renderDashboard();
  renderPeople();
  renderBonuses();
  renderSites();
  renderExpenses();
  renderNotes();
}

function renderDashboard(){
  var totalBonus=data.bonuses.reduce(function(s,b){return s+(parseFloat(b.amount)||0);},0);
  var totalDone=data.bonuses.filter(function(b){return b.status==='done';}).length;
  var totalPend=data.bonuses.filter(function(b){return b.status!=='done';}).length;
  var totalExpenses=data.expenses.reduce(function(s,e){return s+(parseFloat(e.amount)||0);},0);
  var totalCosts=data.costs.reduce(function(s,c){return s+(parseFloat(c.gift||0)+parseFloat(c.postage||0)+parseFloat(c.other||0));},0);
  var netProfit=totalBonus-totalExpenses-totalCosts;
  var now=new Date();
  var todayStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  var weekAgo=new Date(now); weekAgo.setDate(weekAgo.getDate()-7);
  var monthAgo=new Date(now); monthAgo.setDate(monthAgo.getDate()-30);
  function dGte(d,r){return d&&new Date(d)>=r;}
  var bonusToday=data.bonuses.filter(function(b){return b.date&&b.date.startsWith(todayStr);}).reduce(function(s,b){return s+(parseFloat(b.amount)||0);},0);
  var bonusWeek=data.bonuses.filter(function(b){return dGte(b.date,weekAgo);}).reduce(function(s,b){return s+(parseFloat(b.amount)||0);},0);
  var bonusMonth=data.bonuses.filter(function(b){return dGte(b.date,monthAgo);}).reduce(function(s,b){return s+(parseFloat(b.amount)||0);},0);
  var expToday=data.expenses.filter(function(e){return e.date&&e.date.startsWith(todayStr);}).reduce(function(s,e){return s+(parseFloat(e.amount)||0);},0);
  var expWeek=data.expenses.filter(function(e){return dGte(e.date,weekAgo);}).reduce(function(s,e){return s+(parseFloat(e.amount)||0);},0);
  var expMonth=data.expenses.filter(function(e){return dGte(e.date,monthAgo);}).reduce(function(s,e){return s+(parseFloat(e.amount)||0);},0);
  var netToday=bonusToday-expToday;
  var netWeek=bonusWeek-expWeek;
  var netMonth=bonusMonth-expMonth;
  var profitColor=netProfit>=0?'var(--gr)':'var(--re)';
  var profitGlow=netProfit>=0?'#2ECC8F':'#F87171';
  var profitIconBg=netProfit>=0?'var(--gr-d)':'var(--re-d)';

  document.getElementById('stats-row').innerHTML=
    '<div class="stat-card">'+
      '<div class="stat-card-glow" style="--glow:var(--gr)"></div>'+
      '<div class="stat-icon-wrap" style="--icon-bg:var(--gr-d);--icon-c:var(--gr)"><i class="ti ti-cash"></i></div>'+
      '<div class="stat-label">Celkový bonus</div>'+
      '<div class="stat-val money">'+totalBonus.toLocaleString('cs-CZ')+' Kč</div>'+
    '</div>'+
    '<div class="stat-card">'+
      '<div class="stat-card-glow" style="--glow:var(--or)"></div>'+
      '<div class="stat-icon-wrap"><i class="ti ti-users"></i></div>'+
      '<div class="stat-label">Celkem lidí</div>'+
      '<div class="stat-val">'+data.people.length+'</div>'+
      '<div class="stat-sub">'+totalPend+' dárků čeká</div>'+
    '</div>'+
    '<div class="stat-card">'+
      '<div class="stat-card-glow" style="--glow:'+profitGlow+'"></div>'+
      '<div class="stat-icon-wrap" style="--icon-bg:'+profitIconBg+';--icon-c:'+profitColor+'"><i class="ti ti-trending-up"></i></div>'+
      '<div class="stat-label">Čistý zisk</div>'+
      '<div class="stat-val" style="font-family:monospace;font-size:20px;color:'+profitColor+';">'+netProfit.toLocaleString('cs-CZ')+' Kč</div>'+
      '<div class="stat-sub">výdaje: '+(totalExpenses+totalCosts).toLocaleString('cs-CZ')+' Kč</div>'+
    '</div>'+
    '<div class="stat-card">'+
      '<div class="stat-card-glow" style="--glow:var(--am)"></div>'+
      '<div class="stat-icon-wrap" style="--icon-bg:var(--am-d);--icon-c:var(--am)"><i class="ti ti-calendar-day"></i></div>'+
      '<div class="stat-label">Dnes</div>'+
      '<div style="display:flex;align-items:flex-end;justify-content:space-between;gap:8px;margin-top:2px;">'+
        '<div class="stat-val money">'+bonusToday.toLocaleString('cs-CZ')+' Kč</div>'+
        '<div style="text-align:right;padding-bottom:3px;">'+
          '<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:0.6px;font-weight:600;">zisk</div>'+
          '<div style="font-family:monospace;font-size:14px;font-weight:700;color:'+(netToday>=0?'var(--gr)':'var(--re)')+';">'+netToday.toLocaleString('cs-CZ')+' Kč</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="stat-card">'+
      '<div class="stat-card-glow" style="--glow:var(--bl)"></div>'+
      '<div class="stat-icon-wrap" style="--icon-bg:var(--bl-d);--icon-c:var(--bl)"><i class="ti ti-calendar-week"></i></div>'+
      '<div class="stat-label">Posledních 7 dní</div>'+
      '<div style="display:flex;align-items:flex-end;justify-content:space-between;gap:8px;margin-top:2px;">'+
        '<div class="stat-val money">'+bonusWeek.toLocaleString('cs-CZ')+' Kč</div>'+
        '<div style="text-align:right;padding-bottom:3px;">'+
          '<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:0.6px;font-weight:600;">zisk</div>'+
          '<div style="font-family:monospace;font-size:14px;font-weight:700;color:'+(netWeek>=0?'var(--gr)':'var(--re)')+';">'+netWeek.toLocaleString('cs-CZ')+' Kč</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="stat-card">'+
      '<div class="stat-card-glow" style="--glow:var(--pu)"></div>'+
      '<div class="stat-icon-wrap" style="--icon-bg:var(--pu-d);--icon-c:var(--pu)"><i class="ti ti-calendar-month"></i></div>'+
      '<div class="stat-label">Posledních 30 dní</div>'+
      '<div style="display:flex;align-items:flex-end;justify-content:space-between;gap:8px;margin-top:2px;">'+
        '<div class="stat-val money">'+bonusMonth.toLocaleString('cs-CZ')+' Kč</div>'+
        '<div style="text-align:right;padding-bottom:3px;">'+
          '<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:0.6px;font-weight:600;">zisk</div>'+
          '<div style="font-family:monospace;font-size:14px;font-weight:700;color:'+(netMonth>=0?'var(--gr)':'var(--re)')+';">'+netMonth.toLocaleString('cs-CZ')+' Kč</div>'+
        '</div>'+
      '</div>'+
    '</div>';

  var sorted=data.bonuses.filter(function(b){return b.date;}).sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,20);
  var el=document.getElementById('dash-recent');
  if(!sorted.length){
    el.innerHTML='<div style="text-align:center;color:var(--t3);padding:40px;font-size:13px;">Zatím žádná aktivita 🐣</div>';
    return;
  }
  var html='';
  sorted.forEach(function(b){
    var person=data.people.find(function(p){return p.id===b.personId;});
    var site=data.sites.find(function(s){return s.id===b.siteId;});
    html+='<div class="recent-row">'+
      '<div class="avatar avatar-sm">'+(person?ini(person.name):'?')+'</div>'+
      '<div class="rr-info">'+
        '<div class="rr-name">'+(person?person.name:'?')+'</div>'+
        '<div class="rr-sub">'+(site?site.name:'?')+' · '+(b.date?b.date.replace('T',' ').slice(0,16):'bez data')+'</div>'+
      '</div>'+
      '<div class="rr-right">'+
        '<span class="chip chip-green chip-mono">+'+parseFloat(b.amount||0).toLocaleString('cs-CZ')+' Kč</span>'+
        giftChip(b.gift)+statusChip(b.status)+
      '</div>'+
    '</div>'+
    (b.note?'<div style="padding:2px 14px 8px 56px;font-size:12px;color:var(--t2);"><i class="ti ti-notes" style="font-size:12px;margin-right:4px;"></i>'+b.note+'</div>':'');
  });
  el.innerHTML=html;
}

function renderPeople(){
  var searchEl=document.getElementById('people-search');
  var q=searchEl?searchEl.value.trim().toLowerCase():'';
  var filtered=data.people.filter(function(p){return p.name.toLowerCase().includes(q);});
  var c=document.getElementById('people-cards');
  if(!data.people.length){
    c.innerHTML='<div style="text-align:center;color:var(--t3);padding:48px;font-size:13px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);">Zatím nikdo 🐣</div>';
    return;
  }
  if(!filtered.length){
    c.innerHTML='<div style="text-align:center;color:var(--t3);padding:48px;font-size:13px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);">Nikdo nenalezen 🔍</div>';
    return;
  }
  var html='';
  filtered.forEach(function(p){
    var mb=data.bonuses.filter(function(b){return b.personId===p.id;}).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
    var total=mb.reduce(function(s,b){return s+(parseFloat(b.amount)||0);},0);
    var labC=mb.filter(function(b){return b.gift==='labubu';}).length;
    var dumC=mb.filter(function(b){return b.gift==='dumpling';}).length;
    var doneC=mb.filter(function(b){return b.status==='done';}).length;
    var cost=data.costs?data.costs.find(function(c){return c.personId===p.id;}):null;
    var totalCost=cost?(parseFloat(cost.gift||0)+parseFloat(cost.postage||0)+parseFloat(cost.other||0)):0;
    var profit=total-totalCost;
    var usedIds=new Set(mb.map(function(b){return b.siteId;}));
    var doneSites=data.sites.filter(function(s){return usedIds.has(s.id);});
    var remSites=data.sites.filter(function(s){return !usedIds.has(s.id);});
    var av=ini(p.name);
    var subRight=remSites.length
      ?'<span style="color:var(--am);font-size:11px;font-weight:600;">'+remSites.length+' stránek zbývá</span>'
      :'<span style="color:var(--gr);font-size:11px;font-weight:600;">✓ vše hotovo</span>';

    // Bonus rows
    var rows='';
    if(mb.length){
      mb.forEach(function(b){
        var site=data.sites.find(function(s){return s.id===b.siteId;});
        rows+='<tr>'+
          '<td><span style="font-size:11px;color:var(--t3);font-family:monospace;">'+(b.date?b.date.replace('T',' ').slice(0,16):'—')+'</span></td>'+
          '<td>'+(site?'<span class="chip chip-blue">'+site.name+'</span>':'<span style="color:var(--t3)">?</span>')+'</td>'+
          '<td><span class="chip chip-green chip-mono">+'+parseFloat(b.amount||0).toLocaleString('cs-CZ')+' Kč</span></td>'+
          '<td>'+giftChip(b.gift)+'</td>'+
          '<td><select class="status-sel" onchange="updateStatus(\''+b.id+'\',this.value)">'+
            '<option value="pending"'+(b.status==='pending'?' selected':'')+'>⏳ Čeká</option>'+
            '<option value="ordered"'+(b.status==='ordered'?' selected':'')+'>📦 Objednáno</option>'+
            '<option value="wait"'+(b.status==='wait'?' selected':'')+'>🕐 Vyzvednutí</option>'+
            '<option value="done"'+(b.status==='done'?' selected':'')+'>✅ Předáno</option>'+
          '</select></td>'+
          '<td style="white-space:nowrap;">'+
            '<button class="btn btn-ghost btn-sm" onclick="openEditBonusById(\''+b.id+'\');event.stopPropagation()"><i class="ti ti-edit"></i></button>'+
            '<button class="btn btn-danger btn-sm" onclick="deleteBonus(\''+b.id+'\');event.stopPropagation()"><i class="ti ti-trash"></i></button>'+
          '</td>'+
        '</tr>'+
        (b.note?'<tr><td colspan="6" style="padding:4px 10px 10px;font-size:12px;color:var(--t2);"><i class="ti ti-notes" style="font-size:12px;margin-right:4px;"></i>'+b.note+'</td></tr>':'');
      });
    } else {
      rows='<tr><td colspan="6" style="text-align:center;color:var(--t3);padding:20px;font-size:12px;">Žádné bonusy</td></tr>';
    }

    // Person notes
    var pNotes=(data.notes||[]).filter(function(n){return n.personId===p.id;});
    var notesHtml='';
    if(pNotes.length){
      notesHtml='<div class="person-notes">'+
        '<div class="person-notes-title">'+
          '<span><i class="ti ti-notebook" style="font-size:12px;margin-right:4px;"></i> Poznámky ('+pNotes.length+')</span>'+
          '<button class="btn btn-ghost btn-sm" onclick="openNoteModal(\''+p.id+'\');event.stopPropagation()" style="padding:2px 8px;font-size:11px;">+ Přidat</button>'+
        '</div>';
      pNotes.forEach(function(n){
        var bc=n.color==='orange'?'var(--or)':n.color==='green'?'var(--gr)':n.color==='blue'?'var(--bl)':n.color==='purple'?'var(--pu)':n.color==='red'?'var(--re)':'var(--b2)';
        notesHtml+='<div class="person-note-item" style="border-left:2px solid '+bc+';">'+
          (n.title?'<div class="person-note-item-title">'+n.title+'</div>':'')+
          (n.text?'<div class="person-note-item-text">'+n.text+'</div>':'')+
          '<div style="font-size:10px;color:var(--t3);margin-top:4px;display:flex;justify-content:space-between;">'+
            '<span>'+(n.date||'')+'</span>'+
            '<span style="display:flex;gap:4px;">'+
              '<button class="btn btn-ghost btn-sm" onclick="editNote(\''+n.id+'\');event.stopPropagation()" style="padding:1px 6px;font-size:11px;"><i class="ti ti-edit"></i></button>'+
              '<button class="btn btn-danger btn-sm" onclick="deleteNote(\''+n.id+'\');event.stopPropagation()" style="padding:1px 6px;font-size:11px;"><i class="ti ti-trash"></i></button>'+
            '</span>'+
          '</div>'+
        '</div>';
      });
      notesHtml+='</div>';
    }

    html+='<div class="pc" id="pc-'+p.id+'">'+
      '<div class="pc-header" onclick="togglePc(\''+p.id+'\')">'+
        '<div class="avatar avatar-lg">'+av+'</div>'+
        '<div class="pc-info">'+
          '<div class="pc-name">'+p.name+'</div>'+

            '</div>'+

function togglePc(id){document.getElementById('pc-'+id).classList.toggle('open');}

function renderBonuses(){
  var tbody=document.getElementById('bonuses-list');
  var sorted=data.bonuses.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  if(!sorted.length){tbody.innerHTML='<tr class="empty-row"><td colspan="7">Zatím žádné bonusy</td></tr>';return;}
  var html='';
  sorted.forEach(function(b){
    var person=data.people.find(function(p){return p.id===b.personId;});
    var site=data.sites.find(function(s){return s.id===b.siteId;});
    html+='<tr>'+
      '<td><strong>'+(person?person.name:'?')+'</strong></td>'+
      '<td>'+(site?'<span class="chip chip-blue">'+site.name+'</span>':'?')+'</td>'+
      '<td><span class="chip chip-green chip-mono">+'+parseFloat(b.amount||0).toLocaleString('cs-CZ')+' Kč</span></td>'+
      '<td>'+giftChip(b.gift)+'</td>'+
      '<td><select class="status-sel" onchange="updateStatus(\''+b.id+'\',this.value)">'+
        '<option value="pending"'+(b.status==='pending'?' selected':'')+'>⏳ Čeká</option>'+
        '<option value="ordered"'+(b.status==='ordered'?' selected':'')+'>📦 Objednáno</option>'+
        '<option value="wait"'+(b.status==='wait'?' selected':'')+'>🕐 Vyzvednutí</option>'+
        '<option value="done"'+(b.status==='done'?' selected':'')+'>✅ Předáno</option>'+
      '</select></td>'+
      '<td class="hide-mobile" style="font-size:12px;color:var(--t3);font-family:monospace;">'+(b.date?b.date.replace('T',' ').slice(0,16):'—')+'</td>'+
      '<td style="white-space:nowrap;">'+
        '<button class="btn btn-ghost btn-sm" onclick="openEditBonusById(\''+b.id+'\')"><i class="ti ti-edit"></i></button>'+
        '<button class="btn btn-danger btn-sm" onclick="deleteBonus(\''+b.id+'\')"><i class="ti ti-trash"></i></button>'+
      '</td>'+
    '</tr>'+
    (b.note?'<tr><td colspan="7" style="padding:4px 16px 10px;font-size:12px;color:var(--t2);"><i class="ti ti-notes" style="font-size:12px;margin-right:4px;"></i>'+b.note+'</td></tr>':'');
  });
  tbody.innerHTML=html;
}

function renderSites(){
  var grid=document.getElementById('sites-grid');
  if(!data.sites.length){grid.innerHTML='<p style="color:var(--t3);font-size:13px;grid-column:1/-1;">Zatím žádné stránky</p>';return;}
  var html='';
  data.sites.forEach(function(s){
    var cnt=data.bonuses.filter(function(b){return b.siteId===s.id;}).length;
    var tot=data.bonuses.filter(function(b){return b.siteId===s.id;}).reduce(function(a,b){return a+(parseFloat(b.amount)||0);},0);
    html+='<div class="site-card">'+
      '<button class="site-card-del" onclick="deleteSite(\''+s.id+'\')"><i class="ti ti-x"></i></button>'+
      '<div class="site-icon"><i class="ti ti-world"></i></div>'+
      '<div class="site-name">'+s.name+'</div>'+
      '<div class="site-meta">'+cnt+' bonus'+(cnt===1?'':'ů')+' · <span style="color:var(--gr);font-family:monospace;">'+tot.toLocaleString('cs-CZ')+' Kč</span></div>'+
    '</div>';
  });
  grid.innerHTML=html;
}

function renderExpenses(){
  var list=document.getElementById('expenses-list');
  var summary=document.getElementById('expense-summary');
  if(!list)return;
  var catLabels={reklama:'📢 Reklama',material:'📦 Materiál',postovne:'🚚 Poštovné',jine:'💸 Jiné'};
  var total=data.expenses.reduce(function(s,e){return s+(parseFloat(e.amount)||0);},0);
  summary.innerHTML='<div class="expense-summary">'+
    '<div class="expense-sum-item"><div class="expense-sum-label">Celkem výdaje</div><div class="expense-sum-val" style="color:var(--re);">-'+total.toLocaleString('cs-CZ')+' Kč</div></div>'+
    '<div class="expense-sum-item"><div class="expense-sum-label">Počet záznamů</div><div class="expense-sum-val">'+data.expenses.length+'</div></div>'+
  '</div>';
  if(!data.expenses.length){list.innerHTML='<div style="text-align:center;color:var(--t3);padding:40px;font-size:13px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);">Zatím žádné výdaje</div>';return;}
  var sorted=data.expenses.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var html='';
  sorted.forEach(function(e){
    html+='<div class="expense-card">'+
      '<div class="expense-header">'+
        '<div><div class="expense-name">'+e.name+'</div>'+
        '<div class="expense-meta">'+(catLabels[e.category]||e.category)+(e.date?' · '+e.date:'')+(e.note?' · '+e.note:'')+'</div></div>'+
        '<div style="display:flex;align-items:center;gap:8px;">'+
          '<div class="expense-amount">-'+parseFloat(e.amount||0).toLocaleString('cs-CZ')+' Kč</div>'+
          '<button class="btn btn-ghost btn-sm" onclick="editExpense(\''+e.id+'\')"><i class="ti ti-edit"></i></button>'+
          '<button class="btn btn-danger btn-sm" onclick="deleteExpense(\''+e.id+'\')"><i class="ti ti-trash"></i></button>'+
        '</div>'+
      '</div>'+
    '</div>';
  });
  list.innerHTML=html;
}

function renderNotes(){
  var list=document.getElementById('notes-list');
  if(!list)return;
  if(!data.notes||!data.notes.length){
    list.innerHTML='<div style="text-align:center;color:var(--t3);padding:48px;font-size:13px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);">Zatím žádné poznámky 📝</div>';
    return;
  }
  var sorted=data.notes.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var html='<div class="notes-grid">';
  sorted.forEach(function(n){
    var person=n.personId?data.people.find(function(p){return p.id===n.personId;}):null;
    var colorClass=n.color&&n.color!=='default'?' color-'+n.color:'';
    html+='<div class="note-card'+colorClass+'">'+
      '<div class="note-card-actions">'+
        '<button class="btn btn-ghost btn-sm" onclick="editNote(\''+n.id+'\')"><i class="ti ti-edit"></i></button>'+
        '<button class="btn btn-danger btn-sm" onclick="deleteNote(\''+n.id+'\')"><i class="ti ti-trash"></i></button>'+
      '</div>'+
      (n.title?'<div class="note-card-title">'+n.title+'</div>':'')+
      (n.text?'<div class="note-card-text">'+n.text+'</div>':'')+
      '<div class="note-card-meta">'+
        (person?'<span class="note-card-person">'+person.name+'</span>':'')+
        '<span>'+(n.date||'')+'</span>'+
      '</div>'+
    '</div>';
  });
  html+='</div>';
  list.innerHTML=html;
}

// ── BONUS MODAL ──
function filterSitesForPerson(personId){
  var editId=document.getElementById('b-id').value;
  var usedIds=new Set(data.bonuses.filter(function(b){return b.personId===personId&&b.id!==editId;}).map(function(b){return b.siteId;}));
  var available=data.sites.filter(function(s){return !usedIds.has(s.id);});
  var ss=document.getElementById('b-site');
  ss.innerHTML=available.map(function(s){return '<option value="'+s.id+'">'+s.name+'</option>';}).join('');
  if(!available.length) ss.innerHTML='<option value="">— všechny stránky hotovy —</option>';
}
function populateBonusModal(prePersonId){
  var ps=document.getElementById('b-person');
  ps.innerHTML=data.people.map(function(p){return '<option value="'+p.id+'"'+(p.id===prePersonId?' selected':'')+'>'+p.name+'</option>';}).join('');
  if(!data.people.length) ps.innerHTML='<option value="">— nejdřív přidej lidi —</option>';
  filterSitesForPerson(prePersonId||ps.value);
  document.getElementById('b-id').value='';
  document.getElementById('b-amount').value='';
  document.getElementById('b-note').value='';
  var ld=new Date();
  document.getElementById('b-date').value=ld.getFullYear()+'-'+String(ld.getMonth()+1).padStart(2,'0')+'-'+String(ld.getDate()).padStart(2,'0')+'T'+String(ld.getHours()).padStart(2,'0')+':'+String(ld.getMinutes()).padStart(2,'0');
  document.getElementById('b-gift').value='labubu';
  document.getElementById('b-status').value='pending';
  document.getElementById('bonus-modal-title').textContent='Nový bonus';
}
function openEditBonus(personId){openModal('modal-bonus',personId);}
function openEditBonusById(id){
  var b=data.bonuses.find(function(x){return x.id===id;});
  if(!b)return;
  populateBonusModal();
  document.getElementById('b-id').value=b.id;
  document.getElementById('b-person').value=b.personId;
  filterSitesForPerson(b.personId);
  document.getElementById('b-site').value=b.siteId;
  document.getElementById('b-amount').value=b.amount;
  document.getElementById('b-gift').value=b.gift;
  document.getElementById('b-status').value=b.status;
  document.getElementById('b-date').value=b.date||'';
  document.getElementById('b-note').value=b.note||'';
  document.getElementById('bonus-modal-title').textContent='Upravit bonus';
  openModal('modal-bonus');
}

// ── SAVE FUNCTIONS ──
function savePerson(){
  var name=document.getElementById('p-name').value.trim();
  if(!name)return alert('Zadej jméno');
  data.people.push({id:uid(),name:name});
  save();render();closeModal('modal-person');
  document.getElementById('p-name').value='';
}
function saveBonus(){
  var personId=document.getElementById('b-person').value;
  var siteId=document.getElementById('b-site').value;
  var amount=document.getElementById('b-amount').value;
  var gift=document.getElementById('b-gift').value;
  var status=document.getElementById('b-status').value;
  var date=document.getElementById('b-date').value;
  var note=document.getElementById('b-note').value;
  var editId=document.getElementById('b-id').value;
  if(!personId||!siteId)return alert('Vyber člověka a stránku');
  if(editId){
    var b=data.bonuses.find(function(x){return x.id===editId;});
    if(b){b.personId=personId;b.siteId=siteId;b.amount=amount;b.gift=gift;b.status=status;b.date=date;b.note=note;}
  } else {
    data.bonuses.push({id:uid(),personId:personId,siteId:siteId,amount:amount,gift:gift,status:status,date:date,note:note});
  }
  save();render();closeModal('modal-bonus');
}
function saveSite(){
  var name=document.getElementById('s-name').value.trim();
  if(!name)return alert('Zadej název');
  data.sites.push({id:uid(),name:name});
  save();render();closeModal('modal-site');
  document.getElementById('s-name').value='';
}
function saveExpense(){
  var name=document.getElementById('ex-name').value.trim();
  var amount=document.getElementById('ex-amount').value;
  var date=document.getElementById('ex-date').value;
  var category=document.getElementById('ex-category').value;
  var note=document.getElementById('ex-note').value;
  var editId=document.getElementById('ex-id').value;
  if(!name)return alert('Zadej název');
  if(editId){
    var e=data.expenses.find(function(x){return x.id===editId;});
    if(e){e.name=name;e.amount=amount;e.date=date;e.category=category;e.note=note;}
  } else {
    data.expenses.push({id:uid(),name:name,amount:amount,date:date,category:category,note:note});
  }
  save();render();closeModal('modal-expense');
}
function editExpense(id){
  var e=data.expenses.find(function(x){return x.id===id;});
  if(!e)return;
  document.getElementById('ex-id').value=e.id;
  document.getElementById('ex-name').value=e.name;
  document.getElementById('ex-amount').value=e.amount;
  document.getElementById('ex-date').value=e.date||'';
  document.getElementById('ex-category').value=e.category;
  document.getElementById('ex-note').value=e.note||'';
  document.getElementById('expense-modal-title').textContent='Upravit výdaj';
  openModal('modal-expense');
}
function deleteExpense(id){
  if(!confirm('Smazat?'))return;
  data.expenses=data.expenses.filter(function(e){return e.id!==id;});
  save();render();
}
function openCostModal(personId){
  var person=data.people.find(function(p){return p.id===personId;});
  document.getElementById('co-person-id').value=personId;
  document.getElementById('cost-modal-title').textContent='Náklady — '+(person?person.name:'');
  var cost=data.costs.find(function(c){return c.personId===personId;});
  document.getElementById('co-gift').value=cost?cost.gift||'':'';
  document.getElementById('co-postage').value=cost?cost.postage||'':'';
  document.getElementById('co-other').value=cost?cost.other||'':'';
  document.getElementById('co-note').value=cost?cost.note||'':'';
  openModal('modal-cost');
}
function saveCost(){
  var personId=document.getElementById('co-person-id').value;
  var gift=document.getElementById('co-gift').value;
  var postage=document.getElementById('co-postage').value;
  var other=document.getElementById('co-other').value;
  var note=document.getElementById('co-note').value;
  var idx=data.costs.findIndex(function(c){return c.personId===personId;});
  if(idx>=0){data.costs[idx]={personId:personId,gift:gift,postage:postage,other:other,note:note};}
  else{data.costs.push({personId:personId,gift:gift,postage:postage,other:other,note:note});}
  save();render();closeModal('modal-cost');
}

// ── NOTES ──
function selectNoteColor(color){
  document.getElementById('n-color').value=color;
  document.querySelectorAll('.note-color-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.color===color);
  });
}
function openNoteModal(personId){
  document.getElementById('n-id').value='';
  document.getElementById('n-title').value='';
  document.getElementById('n-text').value='';
  document.getElementById('n-color').value='default';
  document.querySelectorAll('.note-color-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.color==='default');
  });
  var sel=document.getElementById('n-person');
  sel.innerHTML='<option value="">— obecná poznámka —</option>'+
    data.people.map(function(p){return '<option value="'+p.id+'"'+(p.id===personId?' selected':'')+'>'+p.name+'</option>';}).join('');
  document.getElementById('note-modal-title').textContent='Nová poznámka';
  document.getElementById('modal-note').classList.add('open');
}
function editNote(id){
  var n=data.notes.find(function(x){return x.id===id;});
  if(!n)return;
  document.getElementById('n-id').value=n.id;
  document.getElementById('n-title').value=n.title||'';
  document.getElementById('n-text').value=n.text||'';
  document.getElementById('n-color').value=n.color||'default';
  document.querySelectorAll('.note-color-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.color===(n.color||'default'));
  });
  var sel=document.getElementById('n-person');
  sel.innerHTML='<option value="">— obecná poznámka —</option>'+
    data.people.map(function(p){return '<option value="'+p.id+'"'+(p.id===n.personId?' selected':'')+'>'+p.name+'</option>';}).join('');
  document.getElementById('note-modal-title').textContent='Upravit poznámku';
  document.getElementById('modal-note').classList.add('open');
}
function saveNote(){
  var title=document.getElementById('n-title').value.trim();
  var text=document.getElementById('n-text').value.trim();
  var personId=document.getElementById('n-person').value;
  var color=document.getElementById('n-color').value;
  var editId=document.getElementById('n-id').value;
  if(!title&&!text)return alert('Zadej název nebo text');
  var now=new Date();
  var dateStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  if(!data.notes)data.notes=[];
  if(editId){
    var n=data.notes.find(function(x){return x.id===editId;});
    if(n){n.title=title;n.text=text;n.personId=personId;n.color=color;}
  } else {
    data.notes.push({id:uid(),title:title,text:text,personId:personId,color:color,date:dateStr});
  }
  save();render();closeModal('modal-note');
}
function deleteNote(id){
  if(!confirm('Smazat poznámku?'))return;
  data.notes=data.notes.filter(function(n){return n.id!==id;});
  save();render();
}

// ── DELETE / UPDATE ──
function updateStatus(id,status){
  var b=data.bonuses.find(function(x){return x.id===id;});
  if(b){b.status=status;save();render();}
}
function deletePerson(id){
  if(!confirm('Smazat tohoto člověka i jeho bonusy?'))return;
  data.people=data.people.filter(function(p){return p.id!==id;});
  data.bonuses=data.bonuses.filter(function(b){return b.personId!==id;});
  data.costs=data.costs.filter(function(c){return c.personId!==id;});
  data.notes=(data.notes||[]).filter(function(n){return n.personId!==id;});
  save();render();
}
function deleteBonus(id){
  if(!confirm('Smazat?'))return;
  data.bonuses=data.bonuses.filter(function(b){return b.id!==id;});
  save();render();
}
function deleteSite(id){
  if(!confirm('Smazat?'))return;
  data.sites=data.sites.filter(function(s){return s.id!==id;});
  save();render();
}

</script>

body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.login-box{background:var(--s1);border:1px solid var(--b2);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo-emoji{font-size:44px;line-height:1;margin-bottom:12px;}
.login-logo-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.login-logo-title span{color:var(--or);}
.login-logo-sub{font-size:13px;color:var(--t3);margin-top:4px;}
.login-label{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:6px;}
.login-input{width:100%;padding:11px 14px;border:1px solid var(--b2);border-radius:var(--r3);background:var(--s2);color:var(--t1);font-family:inherit;font-size:14px;outline:none;transition:border-color 0.15s;margin-bottom:14px;}
.login-input:focus{border-color:var(--or);}
.login-btn{width:100%;padding:12px;background:var(--or);color:#fff;border:none;border-radius:var(--r3);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.15s;margin-top:4px;}
.login-btn:hover{opacity:0.88;}
.login-btn:disabled{opacity:0.55;cursor:not-allowed;}
#login-err{text-align:center;color:var(--re);font-size:13px;margin-top:10px;min-height:16px;}

/* ── APP SHELL ── */
.app{display:flex;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{width:220px;min-width:220px;background:#16161a;border-right:1px solid rgba(255,255,255,0.12);padding:18px 12px;display:flex;flex-direction:column;gap:2px;position:sticky;top:0;height:100vh;flex-shrink:0;overflow-y:auto;}
.logo{font-size:17px;font-weight:800;padding:6px 10px 20px;color:var(--t1);letter-spacing:-0.4px;display:flex;align-items:center;gap:8px;}
.logo em{color:var(--or);font-style:normal;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--r3);cursor:pointer;color:var(--t2);font-weight:500;font-size:13.5px;transition:all 0.12s;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--s2);color:var(--t1);}
.nav-item.active{background:var(--or-d2);color:var(--or);font-weight:600;}
.nav-item i{font-size:17px;flex-shrink:0;}
.nav-section{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:14px 11px 5px;}
.sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--b1);}
.sidebar-user{font-size:11px;color:var(--t3);padding:2px 10px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── MAIN ── */
.main{flex:1;min-width:0;padding:30px 32px;overflow-x:hidden;}
.page{display:none;}
.page.active{display:block;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.page-title{font-size:22px;font-weight:800;letter-spacing:-0.6px;}

/* ── STAT CARDS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
.stat-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:20px 22px;position:relative;overflow:hidden;transition:border-color 0.15s;}
.stat-card:hover{border-color:var(--b2);}
.stat-card-glow{position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;opacity:0.07;background:var(--glow,var(--or));}
.stat-icon-wrap{width:36px;height:36px;border-radius:10px;background:var(--icon-bg,var(--or-d));display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.stat-icon-wrap i{font-size:18px;color:var(--icon-c,var(--or));}
.stat-label{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;}
.stat-val{font-size:30px;font-weight:800;color:var(--t1);letter-spacing:-1.5px;line-height:1;}
.stat-val.money{font-family:'DM Mono',monospace;font-size:22px;color:var(--gr);letter-spacing:-0.5px;}
.stat-sub{font-size:11px;color:var(--t3);margin-top:5px;}

/* ── SECTION LABEL ── */
.sec-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r3);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all 0.12s;white-space:nowrap;}
.btn-primary{background:var(--or);color:#fff;border-color:var(--or);}
.btn-primary:hover{opacity:0.85;}
.btn-ghost{background:transparent;color:var(--t2);border-color:var(--b2);}
.btn-ghost:hover{background:var(--s2);color:var(--t1);}
.btn-sm{padding:4px 10px;font-size:12px;gap:4px;border-radius:6px;}
.btn-danger{background:transparent;color:var(--re);border-color:rgba(248,113,113,0.18);}
.btn-danger:hover{background:var(--re-d);}
.btn-green{background:var(--gr-d);color:var(--gr);border-color:rgba(46,204,143,0.2);}
.btn-green:hover{background:rgba(46,204,143,0.22);}

/* ── SURFACE CARD ── */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;}

/* ── TABLE ── */
.table-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;background:var(--s2);border-bottom:1px solid var(--b1);}
td{padding:11px 16px;border-bottom:1px solid var(--b1);font-size:13px;vertical-align:middle;color:var(--t1);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--s2);}
.empty-row td{text-align:center;color:var(--t3);padding:36px;font-size:13px;}

/* ── CHIPS & BADGES ── */
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:6px;font-size:12px;font-weight:600;}
.chip-green{background:var(--gr-d);color:var(--gr);}
.chip-amber{background:var(--am-d);color:var(--am);}
.chip-blue{background:var(--bl-d);color:var(--bl);}
.chip-purple{background:var(--pu-d);color:var(--pu);}
.chip-red{background:var(--re-d);color:var(--re);}
.chip-mono{font-family:'DM Mono',monospace;}

/* ── STATUS SELECT ── */
.status-sel{background:var(--s3);border:1px solid var(--b1);color:var(--t2);border-radius:6px;padding:3px 7px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;outline:none;}
.status-sel:focus{border-color:var(--or);}
option{background:#222226;}

/* ── RECENT ROWS ── */
.recent-row{display:flex;align-items:center;gap:13px;padding:12px 18px;border-bottom:1px solid var(--b1);transition:background 0.1s;}
.recent-row:last-child{border-bottom:none;}
.recent-row:hover{background:var(--s2);}
.avatar{border-radius:10px;background:var(--or-d2);color:var(--or);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:-0.5px;}
.avatar-lg{width:40px;height:40px;}
.avatar-sm{width:32px;height:32px;font-size:11px;border-radius:8px;}
.rr-info{flex:1;min-width:0;}
.rr-name{font-size:13px;font-weight:600;}
.rr-sub{font-size:11px;color:var(--t3);margin-top:2px;}
.rr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}

/* ── PERSON CARDS ── */
.pc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color 0.15s;}
.pc:hover{border-color:var(--b2);}
.pc.open{border-color:rgba(255,107,43,0.28);}
.pc-header{display:flex;align-items:center;padding:15px 18px;cursor:pointer;gap:14px;user-select:none;}
.pc-info{flex:1;min-width:0;}
.pc-name{font-size:15px;font-weight:700;}
.pc-sub{font-size:12px;color:var(--t3);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.pc-sub-dot{color:var(--t3);opacity:0.4;}
.pc-right{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.pc-total{font-family:'DM Mono',monospace;font-weight:500;font-size:15px;color:var(--gr);}
.pc-chevron{color:var(--t3);font-size:16px;transition:transform 0.2s;}
.pc.open .pc-chevron{transform:rotate(180deg);}

.pc-body{display:none;border-top:1px solid var(--b1);}
.pc.open .pc-body{display:block;}

/* Mini stats strip */
.pc-stats{display:grid;grid-template-columns:repeat(6,1fr);border-bottom:1px solid var(--b1);}
.pc-stat{padding:13px 16px;text-align:center;border-right:1px solid var(--b1);}
.pc-stat:last-child{border-right:none;}
.pc-stat-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:0.6px;font-weight:600;margin-bottom:4px;}
.pc-stat-val{font-size:17px;font-weight:800;}
.pc-stat-val.money{font-family:'DM Mono',monospace;font-size:14px;color:var(--gr);}

/* Sites progress */
.pc-sites{padding:14px 18px;border-bottom:1px solid var(--b1);display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.pc-sites-col-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:9px;display:flex;align-items:center;gap:5px;}
.pc-sites-col-title i{font-size:13px;}
.pc-sites-pills{display:flex;flex-wrap:wrap;gap:5px;}
.pc-site-pill{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.pc-site-pill-done{background:var(--gr-d);color:var(--gr);}
.pc-site-pill-rem{background:var(--am-d);color:var(--am);}

/* Bonus table inside card */
.pc-body table th{background:var(--s2);}
.pc-body td{padding:9px 16px;}
.pc-actions{padding:10px 14px;display:flex;gap:7px;border-top:1px solid var(--b1);background:var(--s2);}

/* ── SITES GRID ── */
.sites-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
.site-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:18px 20px;position:relative;transition:border-color 0.15s;}
.site-card:hover{border-color:var(--b2);}
.site-card-del{position:absolute;top:11px;right:11px;background:none;border:none;cursor:pointer;color:var(--t3);font-size:15px;transition:color 0.12s;padding:2px;line-height:1;}
.site-card-del:hover{color:var(--re);}
.site-icon{width:34px;height:34px;background:var(--bl-d);border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.site-icon i{font-size:17px;color:var(--bl);}
.site-name{font-size:15px;font-weight:700;margin-bottom:4px;}
.site-meta{font-size:12px;color:var(--t3);}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:18px;padding:28px;width:100%;max-width:460px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.modal-title{font-size:17px;font-weight:800;letter-spacing:-0.3px;}
.modal-close{background:none;border:none;cursor:pointer;color:var(--t3);font-size:20px;padding:2px;line-height:1;transition:color 0.12s;}
.modal-close:hover{color:var(--t1);}
.form-group{margin-bottom:15px;}
.form-label{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:0.5px;}
.form-control{width:100%;padding:10px 13px;border:1px solid var(--b2);border-radius:var(--r3);font-family:inherit;font-size:14px;background:var(--s2);color:var(--t1);outline:none;transition:border-color 0.12s;}
.form-control:focus{border-color:var(--or);}
select.form-control{cursor:pointer;}
option{background:#18181b;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;}

/* ── NOTE CARDS ── */
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.note-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px 18px;position:relative;transition:border-color 0.15s;}
.note-card:hover{border-color:var(--b2);}
.note-card.color-orange{border-left:3px solid var(--or);background:rgba(255,107,43,0.04);}
.note-card.color-green{border-left:3px solid var(--gr);background:rgba(46,204,143,0.04);}
.note-card.color-blue{border-left:3px solid var(--bl);background:rgba(91,164,245,0.04);}
.note-card.color-purple{border-left:3px solid var(--pu);background:rgba(167,139,250,0.04);}
.note-card.color-red{border-left:3px solid var(--re);background:rgba(248,113,113,0.04);}
.note-card-title{font-size:14px;font-weight:700;margin-bottom:6px;padding-right:50px;}
.note-card-text{font-size:13px;color:var(--t2);line-height:1.5;white-space:pre-wrap;word-break:break-word;}
.note-card-meta{font-size:11px;color:var(--t3);margin-top:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.note-card-person{background:var(--or-d);color:var(--or);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;}
.note-card-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px;}

/* Person notes inline */
.person-notes{padding:12px 16px;border-bottom:1px solid var(--b1);}
.person-notes-title{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.person-note-item{background:var(--s2);border-radius:var(--r3);padding:8px 12px;margin-bottom:6px;font-size:12px;}
.person-note-item:last-child{margin-bottom:0;}
.person-note-item-title{font-weight:700;color:var(--t1);margin-bottom:2px;}
.person-note-item-text{color:var(--t2);line-height:1.4;white-space:pre-wrap;}
.note-color-btn.active{border-color:var(--t1) !important;}

/* ── EXPENSE CARDS ── */
.expense-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:18px 20px;margin-bottom:10px;transition:border-color 0.15s;}
.expense-card:hover{border-color:var(--b2);}
.expense-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.expense-name{font-size:14px;font-weight:600;}
.expense-amount{font-family:'DM Mono',monospace;font-size:14px;color:var(--re);font-weight:600;}
.expense-meta{font-size:12px;color:var(--t3);}
.expense-summary{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px 20px;margin-bottom:20px;display:flex;gap:24px;flex-wrap:wrap;}
.expense-sum-item{display:flex;flex-direction:column;gap:3px;}
.expense-sum-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:0.7px;font-weight:600;}
.expense-sum-val{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;}

/* ── BOTTOM NAV (desktop hidden) ── */
.bottom-nav{display:none;}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{display:none !important;}
  .app{display:block !important;}
  .main{
    padding:16px 14px 84px 14px;
    max-width:100%;
    width:100%;
  }

  /* Bottom nav */
  .bottom-nav{
    display:flex !important;
    position:fixed;
    bottom:0;left:0;right:0;
    background:var(--s1);
    border-top:1px solid var(--b2);
    z-index:999;
    padding-bottom:env(safe-area-inset-bottom,0px);
  }
  .bottom-nav-item{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:8px 2px;
    cursor:pointer;
    border:none;
    background:none;
    color:var(--t3);
    font-family:inherit;
    font-size:10px;
    font-weight:600;
    gap:3px;
    transition:color 0.12s;
    position:relative;
  }
  .bottom-nav-item i{font-size:22px;}
  .bottom-nav-item.active{color:var(--or);}
  .bn-badge{
    position:absolute;
    top:4px;
    right:calc(50% - 18px);
    background:var(--re);
    color:#fff;
    border-radius:99px;
    font-size:9px;
    font-weight:700;
    padding:1px 5px;
    min-width:16px;
    text-align:center;
    line-height:14px;
  }

  /* Mobile header */
  .page-header{
    margin-bottom:14px;
    flex-wrap:wrap;
    gap:10px;
  }
  .page-title{font-size:19px;}

  /* Stats — 2 per row */
  .stats-row{
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-bottom:16px;
  }
  .stat-card{padding:12px 12px;}
  .stat-card-glow{display:none;}
  .stat-icon-wrap{width:28px;height:28px;border-radius:7px;margin-bottom:8px;}
  .stat-icon-wrap i{font-size:14px;}
  .stat-label{font-size:10px;margin-bottom:3px;}
  .stat-val{font-size:20px;letter-spacing:-1px;}
  .stat-val.money{font-size:16px;}
  .stat-sub{font-size:10px;}

  /* Person cards */
  .pc-header{padding:12px 12px;gap:10px;}
  .avatar-lg{width:36px;height:36px;font-size:13px;border-radius:9px;}
  .pc-name{font-size:14px;}
  .pc-sub{font-size:11px;gap:4px;}
  .pc-total{font-size:13px;}
  .pc-chevron{font-size:14px;}
  .pc-stats{grid-template-columns:repeat(3,1fr);}
  .pc-stat{padding:10px 8px;}
  .pc-stat:nth-child(3n){border-right:none;}
  .pc-stat-lbl{font-size:9px;}
  .pc-stat-val{font-size:15px;}
  .pc-sites{grid-template-columns:1fr;padding:12px 12px;gap:10px;}
  .pc-actions{padding:8px 12px;gap:6px;flex-wrap:wrap;}

  /* Tables */
  .hide-mobile{display:none !important;}
  table{font-size:12px;}
  th{padding:8px 10px;font-size:10px;letter-spacing:0.4px;}
  td{padding:9px 10px;}

  /* Recent rows */
  .recent-row{padding:10px 12px;gap:10px;}
  .avatar-sm{width:30px;height:30px;font-size:11px;}
  .rr-name{font-size:13px;}
  .rr-sub{font-size:11px;}
  .rr-right{gap:5px;flex-wrap:wrap;justify-content:flex-end;max-width:150px;}
  .chip{font-size:11px;padding:2px 7px;}

  /* Modals — slide up from bottom */
  .modal-overlay{
    align-items:flex-end !important;
    padding:0 !important;
  }
  .modal{
    border-radius:20px 20px 0 0 !important;
    padding:24px 18px 32px !important;
    max-width:100% !important;
    width:100%;
    max-height:90vh;
    overflow-y:auto;
  }

  /* Forms */
  .form-row{grid-template-columns:1fr !important;}
  .form-control{font-size:16px;}

  /* Sites */
  .sites-grid{grid-template-columns:1fr 1fr;gap:8px;}
  .site-card{padding:14px 14px;}

  /* Expenses */
  .expense-summary{gap:12px;padding:12px 14px;}
  .expense-card{padding:14px 14px;}

  /* Search */
  #people-search{font-size:16px !important;}

  /* Sec label */
  .sec-label{font-size:10px;}
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-emoji">🐣</div>
      <div class="login-logo-title">Labubu<span>.</span></div>
      <div class="login-logo-sub">Přihlaš se pro přístup</div>
    </div>
    <label class="login-label">Email</label>
    <input id="login-email" type="email" class="login-input" placeholder="tvuj@email.cz">
    <label class="login-label">Heslo</label>
    <input id="login-pass" type="password" class="login-input" placeholder="••••••••">
    <button id="login-btn" class="login-btn" onclick="window._fbSignIn()">Přihlásit se</button>
    <div id="login-err"></div>
  </div>
</div>

<!-- ── LOADING ── -->
<div id="loading-screen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
  <div style="font-size:48px;">🐣</div>
  <div style="color:var(--t2);font-size:14px;font-weight:600;">Načítám data...</div>
  <div style="width:40px;height:3px;background:var(--or);border-radius:3px;animation:loadbar 1s ease-in-out infinite alternate;"></div>

<script>
var data = {people:[],sites:[],bonuses:[],costs:[],expenses:[]};
var DB_DOC = 'labubu/main';
var _saveTimer = null;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

// Save to Firestore with debounce (500ms)
function save(){
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function(){
    db.doc(DB_DOC).set(data).catch(function(e){
      console.error('Save error:', e);
    });
  }, 500);
}

// Load from Firestore and subscribe to real-time updates>
